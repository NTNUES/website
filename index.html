<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>師大地球科學系學會官方網站</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 和 ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 引入 Babel 用於解析 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 設定 Tailwind 字型與基本樣式 -->
  <style>
    /* 引入 Google Fonts */
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;700;900&display=swap');

    body { 
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif; 
      background-color: #ffffff;
      color: #1a1a1a;
    }
    
    h1, h2, h3, h4, .serif-font {
      font-family: "Noto Serif TC", serif;
    }

    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    
    .fade-in-up {
      animation: fadeInUp 0.8s ease-out forwards;
      opacity: 0;
      transform: translateY(20px);
    }
    
    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- 圖示組件 ---
    const IconWrapper = ({ children, size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );

    const ChevronDown = (props) => <IconWrapper {...props}><path d="m6 9 6 6 6-6"/></IconWrapper>;
    const ChevronLeft = (props) => <IconWrapper {...props}><path d="m15 18-6-6 6-6"/></IconWrapper>;
    const ChevronRight = (props) => <IconWrapper {...props}><path d="m9 18 6-6-6-6"/></IconWrapper>;
    const Download = (props) => <IconWrapper {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></IconWrapper>;
    const ExternalLink = (props) => <IconWrapper {...props}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></IconWrapper>;
    const Calendar = (props) => <IconWrapper {...props}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></IconWrapper>;
    const ArrowRight = (props) => <IconWrapper {...props}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></IconWrapper>;

    // --- 資料整合區 (方便管理) ---
    const eventsData = [
      {
        id: 1,
        title: "萬聖趴",
        date: "2025/10/31",
        image: "https://drive.google.com/thumbnail?id=1pXmMYvZO8IlypMpRt3N3x2ZP_iAUHyvW&sz=w3840",
        desc: "透過小飲料與趣味遊戲，促進同學間及師生間的交流互動，讓大家在平時緊湊而高壓的學習生活中，能夠暫時放下壓力，在輕鬆愉快的氛圍中休息片刻，調整心情，為接下來的學習重新充電。"
      },
      {
        id: 2,
        title: "四系聯合迎新烤肉",
        subtitle: "生科 × 地科 × 營養 × 化學",
        date: "2025/10/02",
        image: "https://drive.google.com/thumbnail?id=1TY4kR8JliVkBLJgeE1IyRd5Zh2dIFgrc&sz=w3840",
        desc: "今年我們結合了師大生科、地科、營養、化學共四大系，準備一場絕對不容錯過的迎新烤肉派對！"
      },
      {
        id: 3,
        title: "三系聯合宿營",
        date: "2025/09/20-21",
        image: "https://drive.google.com/thumbnail?id=1DijSfLR_Onxfg-SSYRxxESWysDcP21mu&sz=w3840",
        desc: "兩天一夜的活動，此次與師大東亞與臺文系共同舉辦。"
      },
      {
        id: 4,
        title: "伯樂大學堂 學系之夜",
        date: "2025/08/27",
        image: "https://drive.google.com/thumbnail?id=1FB2JCcReTGmoINqnqeIl9MpbCVuhWeXj&sz=w3840",
        desc: "新生參與的第一個活動，透過系上老師對系上的介紹、行星分家與抽直屬活動，讓新生更快適應並與大學生活接軌。"
      }
    ];

    // --- 輪播圖組件 (HeroCarousel) ---
    const HeroCarousel = ({ onNavigate }) => {
      const slides = eventsData;
      const [current, setCurrent] = useState(0);
      const timeoutRef = useRef(null);

      const resetTimeout = () => {
        if (timeoutRef.current) {
          clearTimeout(timeoutRef.current);
        }
      };

      useEffect(() => {
        resetTimeout();
        timeoutRef.current = setTimeout(() => {
          setCurrent((prevIndex) => 
            prevIndex === slides.length - 1 ? 0 : prevIndex + 1
          );
        }, 5000);
        return () => { resetTimeout(); };
      }, [current]);

      const nextSlide = (e) => {
        if(e) e.stopPropagation();
        setCurrent(current === slides.length - 1 ? 0 : current + 1);
      };

      const prevSlide = (e) => {
        if(e) e.stopPropagation();
        setCurrent(current === 0 ? slides.length - 1 : current - 1);
      };

      return (
        <div className="relative w-full h-[300px] md:h-[500px] lg:h-[600px] overflow-hidden mb-12 group bg-slate-100 cursor-pointer">
          <div 
            className="w-full h-full flex transition-transform duration-700 ease-out"
            style={{ transform: `translateX(-${current * 100}%)` }}
            onClick={() => onNavigate('events')} 
          >
            {slides.map((slide) => (
              <div key={slide.id} className="min-w-full h-full relative">
                <img 
                  src={slide.image} 
                  alt={slide.title} 
                  className="w-full h-full object-cover"
                  referrerPolicy="no-referrer"
                  onError={(e) => {
                    e.target.onerror = null;
                    e.target.src = "https://placehold.co/1920x1080/e2e8f0/64748b?text=Image+Loading+Error";
                  }}
                />
                <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/10 to-transparent"></div>
                <div className="absolute bottom-0 left-0 w-full p-6 md:p-12 text-white">
                  <div className="max-w-5xl mx-auto border-l-4 border-[#fff] pl-4 md:pl-6 transform transition-all duration-700 translate-y-0">
                    <span className="block text-sm md:text-lg font-medium tracking-wider mb-2 text-blue-200 drop-shadow-md">
                      {slide.date}
                    </span>
                    <h2 className="text-2xl md:text-5xl font-bold serif-font tracking-wide drop-shadow-md flex flex-wrap items-center gap-3 leading-tight">
                      {slide.title}
                      {slide.subtitle && <span className="text-lg md:text-2xl font-light opacity-90 block w-full mt-1">{slide.subtitle}</span>}
                      <span className="opacity-0 group-hover:opacity-100 transition-opacity duration-300 text-sm bg-white/20 p-1.5 rounded-full mt-2"><ArrowRight size={24} /></span>
                    </h2>
                  </div>
                </div>
              </div>
            ))}
          </div>
          <button onClick={prevSlide} className="absolute top-1/2 left-4 -translate-y-1/2 bg-black/20 hover:bg-black/40 backdrop-blur-sm text-white p-3 rounded-full opacity-0 group-hover:opacity-100 transition-opacity duration-300 border border-white/20 z-10"><ChevronLeft size={32} /></button>
          <button onClick={nextSlide} className="absolute top-1/2 right-4 -translate-y-1/2 bg-black/20 hover:bg-black/40 backdrop-blur-sm text-white p-3 rounded-full opacity-0 group-hover:opacity-100 transition-opacity duration-300 border border-white/20 z-10"><ChevronRight size={32} /></button>
          <div className="absolute bottom-6 right-8 flex gap-3 z-10">
            {slides.map((_, idx) => (
              <button
                key={idx}
                onClick={(e) => { e.stopPropagation(); setCurrent(idx); }}
                className={`h-2.5 rounded-full transition-all duration-300 border border-white/50 shadow-sm
                  ${current === idx ? 'bg-white w-10' : 'bg-white/30 w-2.5 hover:bg-white/60'}`}
              />
            ))}
          </div>
        </div>
      );
    };

    // --- 主要應用程式 ---
    function App() {
      const [activeTab, setActiveTab] = useState('intro');
      
      useEffect(() => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }, [activeTab]);

      const navItems = [
        { id: 'intro', label: '學會簡介' },
        { id: 'events', label: '活動介紹' },
        { id: 'history', label: '學會歷史' },
        { id: 'members', label: '成員介紹' },
        { id: 'docs', label: '相關文件' },
      ];

      const renderContent = () => {
        switch (activeTab) {
          case 'intro': return <IntroSection onNavigate={setActiveTab} />;
          case 'events': return <EventsSection />;
          case 'history': return <HistorySection />;
          case 'members': return <MembersSection />;
          case 'docs': return <DocsSection />;
          default: return <IntroSection onNavigate={setActiveTab} />;
        }
      };

      return (
        <div className="min-h-screen bg-white text-[#1a1a1a] pb-12 flex flex-col">
          {/* Header 區域 - 移除頂部藍色聯絡資訊列 */}
          <header className="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b border-gray-100 shadow-sm">
            {/* 2. 主要標題區 */}
            <div className="py-4">
              <div className="max-w-5xl mx-auto px-6">
                 <div className="flex flex-col md:flex-row items-center justify-between gap-4">
                    <div className="flex items-center gap-4">
                      {/* Logo 圖片 */}
                      <img 
                        src="https://drive.google.com/thumbnail?id=1N32AeCpmWelPgK1uB0EyJoisDDJzdcck&sz=w400" 
                        alt="系學會 Logo" 
                        className="w-16 h-16 rounded-full object-cover shadow-sm border border-gray-100 bg-white"
                        referrerPolicy="no-referrer"
                      />
                      <div className="flex flex-col items-center md:items-start">
                        <span className="text-xs font-medium text-gray-500 tracking-[0.15em] uppercase">National Taiwan Normal University</span>
                        <h1 className="text-xl md:text-2xl font-bold text-[#003B71] tracking-wide serif-font">地球科學系學會</h1>
                      </div>
                    </div>
                 </div>
              </div>
            </div>

            {/* 3. 導覽列 */}
            <div className="border-t border-gray-100">
              <div className="max-w-5xl mx-auto px-6">
                <nav className="flex justify-center md:justify-start space-x-8 overflow-x-auto scrollbar-hide">
                  {navItems.map((item) => (
                    <button
                      key={item.id}
                      onClick={() => setActiveTab(item.id)}
                      className={`py-4 text-sm tracking-widest transition-all duration-300 border-b-2 font-medium
                        ${activeTab === item.id ? 'border-[#003B71] text-[#003B71]' : 'border-transparent text-gray-400 hover:text-gray-800'}`}
                    >
                      {item.label}
                    </button>
                  ))}
                </nav>
              </div>
            </div>
          </header>

          {/* 主要內容容器 */}
          <main className="w-full flex-grow"> 
            {renderContent()}
          </main>

          {/* 頁尾 - 移除圖示，完全置中排版 */}
          <footer className="bg-slate-50 border-t border-gray-200 mt-20 pt-16 pb-12">
            <div className="max-w-5xl mx-auto px-6 text-center">
              <div className="flex flex-col items-center gap-8">
                {/* Logo & Copyright */}
                <div>
                  <div className="mb-2">
                    <span className="font-serif font-bold text-[#003B71] text-xl">NTNU Earth Sciences</span>
                  </div>
                  <p className="text-sm text-gray-500 mb-1">國立臺灣師範大學 地球科學系學會</p>
                  <p className="text-xs text-gray-400 tracking-wider">© {new Date().getFullYear()} All Rights Reserved.</p>
                </div>

                {/* Contact Info - 無圖示，文字置中，冒號改空格 */}
                <div className="space-y-4 flex flex-col items-center">
                  <h4 className="font-bold text-gray-900 tracking-wide uppercase text-sm border-b border-gray-200 pb-2 inline-block">聯絡我們 Contact Us</h4>
                  <div className="space-y-3 text-sm text-gray-600">
                    <p>地址 (11677) 台北市文山區汀州路四段88號</p>
                    <p>
                      <a href="mailto:ntnues42@gmail.com" className="hover:text-[#003B71] transition-colors">email ntnues42@gmail.com</a>
                    </p>
                    <p>
                      <a href="https://www.facebook.com/ntnuessa" target="_blank" rel="noreferrer" className="hover:text-[#003B71] transition-colors">Facebook 國立臺灣師範大學 地球科學系學會</a>
                    </p>
                    <p>
                      <a href="https://instagram.com/ntnu_es" target="_blank" rel="noreferrer" className="hover:text-[#003B71] transition-colors">IG ntnu_es</a>
                    </p>
                  </div>
                </div>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    // --- 1. 簡介區塊 ---
    const IntroSection = ({ onNavigate }) => (
      <div className="fade-in-up">
        {/* 加入輪播圖組件，並傳入導航函數 */}
        <HeroCarousel onNavigate={onNavigate} />

        {/* 活動預告區塊 */}
        <div className="max-w-4xl mx-auto px-6 mb-20 -mt-6 relative z-20">
          <div className="bg-white p-6 md:p-8 shadow-xl shadow-blue-900/5 rounded-lg border border-gray-100">
            <h3 className="text-[#003B71] font-bold tracking-widest text-sm uppercase mb-6 flex items-center gap-2">
              <Calendar size={18} />
              Upcoming Events 2026
            </h3>
            <div className="grid md:grid-cols-2 gap-8">
              {/* Event Item 1 */}
              <div className="flex gap-4 items-start group">
                <div className="flex-shrink-0 w-16 text-center">
                  <span className="block text-2xl font-bold text-[#003B71] serif-font">07</span>
                  <span className="block text-xs font-medium text-gray-400 uppercase">MAR</span>
                  <span className="block text-xs text-gray-300">2026</span>
                </div>
                <div className="border-l border-gray-200 pl-4 transition-colors group-hover:border-[#003B71]">
                  <h4 className="font-bold text-gray-900 text-lg mb-1 group-hover:text-[#003B71] transition-colors">第四屆小地盃</h4>
                  <p className="text-sm text-gray-500 leading-relaxed">系上傳統體育競賽，歡迎組隊參加。</p>
                </div>
              </div>

              {/* Event Item 2 */}
              <div className="flex gap-4 items-start group">
                <div className="flex-shrink-0 w-16 text-center">
                  <span className="block text-2xl font-bold text-[#003B71] serif-font">20</span>
                  <span className="block text-xs font-medium text-gray-400 uppercase">APR</span>
                  <span className="block text-xs text-gray-300">2026</span>
                </div>
                <div className="border-l border-gray-200 pl-4 transition-colors group-hover:border-[#003B71]">
                  <h4 className="font-bold text-gray-900 text-lg mb-1 group-hover:text-[#003B71] transition-colors">地科週 & 地科展</h4>
                  <p className="text-xs text-[#003B71] font-medium mb-1">04/20-24 地科週 | 04/25 地科展</p>
                  <p className="text-sm text-gray-500 leading-relaxed">透過學生舉辦的展覽，結合系上實驗室的開放，將地科知識科普給大眾。</p>
                </div>
              </div>
            </div>
          </div>
        </div>
        
        <div className="max-w-4xl mx-auto px-6 space-y-20 pb-12">
          {/* Slogan 區塊 */}
          <section className="text-center py-10 border-b border-gray-100">
            <h2 className="text-4xl md:text-5xl font-black text-[#003B71] mb-6 leading-tight serif-font">
              凝聚系上情感<br/>
              <span className="text-3xl md:text-4xl text-[#003B71]/80 mt-2 block">共創美好回憶</span>
            </h2>
            <div className="w-16 h-1 bg-[#003B71] mx-auto mb-8"></div>
            <p className="text-gray-600 text-lg md:text-xl max-w-2xl mx-auto leading-loose font-light">
              歡迎來到師大地科系學會官方網站。<br/>
              我們致力於搭起學生與系所之間的橋樑，<br className="hidden md:block"/>
              舉辦學術講座、體育競賽與娛樂活動。
            </p>
          </section>

          {/* 關於系學會 */}
          <section>
            <div className="mb-8">
              <span className="text-[#003B71] font-bold tracking-widest text-sm uppercase mb-2 block">About Us</span>
              <h3 className="text-3xl font-bold text-gray-900 serif-font">關於系學會</h3>
            </div>
            
            <div className="prose prose-lg text-gray-600 leading-relaxed space-y-6 text-justify">
              <p>
                地球科學系學會是一個充滿活力和友情的大家庭，致力於營造融洽的人際關係，讓地科系的學弟妹們能夠在歡樂的氛圍中更深入地認識彼此以及學長姐們。
              </p>
              <p>
                我們的活動緊扣著互相認識和團結合作的主旨。從學系之夜的歡談，到系烤的美食時光，每一個活動都是讓你們放鬆心情、交流情感的絕佳機會。制服趴、萬聖趴、聖誕趴等主題趴活動，將帶來歡笑和趣味，讓你們共同創造美好的回憶。
              </p>
              <div className="pl-6 border-l-2 border-[#003B71] italic text-gray-500 my-8">
                我們了解大學生活中建立起的深厚友誼有多重要。因此，我們安排了系出遊，讓你們能在旅行中更深入地了解彼此。
              </div>
              <p>
                此外，我們還舉辦了系展，向校內外展示地科系的凝聚力和多彩活動、學術內容。地科營則是一個帶有教育性質的活動，讓高中生們更能了解地科系。無論你是新生還是資深學長姐，我們都歡迎你加入我們的活動。
              </p>
            </div>
          </section>

          {/* 關於學系 */}
          <section className="pt-12 border-t border-gray-100">
            <div className="mb-8">
              <span className="text-[#003B71] font-bold tracking-widest text-sm uppercase mb-2 block">Department</span>
              <h3 className="text-3xl font-bold text-gray-900 serif-font">關於學系</h3>
            </div>

            <div className="space-y-8">
              <div className="bg-slate-50 p-8 md:p-10">
                <h4 className="text-2xl font-bold text-[#003B71] mb-4 serif-font">注意看 這個校系叫師大地科</h4>
                <p className="text-xl font-medium text-gray-700 mb-6">居然是全台唯一五大領域通包的地球解密所！</p>
                <p className="text-gray-600 leading-loose">
                  師大地科的前身，是1976年(民國65年)從物理系分出來的「地球科學組」 ，後來在1984年正式獨立成系，是全國最早以培養地科老師為宗旨的科系之一。
                </p>
                <p className="mt-4 text-[#003B71] font-bold">全臺灣只有我們師大地科，五大領域都齊全！我們是唯一！</p>
              </div>

              <div className="text-gray-600 leading-relaxed space-y-4 text-justify">
                <p>隨著師大轉型為研究型大學，我們也一路進化，設了碩士班、博士班，研究領域超廣：從地質的岩石與斷層、地物的地震與重力、大氣的氣候與天氣、海洋的洋流與生物，到天文的恆星與黑洞，我們全都包辦~</p>
                <p>不管你想成為科學家還是地科老師，這裡都有路。想教書？我們有師大的超讚教育資源。想研究？我們有超強教授團＋外籍師資，全英授課也不是問題！</p>
                <p className="text-sm text-gray-400 mt-4 text-center">— 師大地科＝研究 × 教學 × 國際視野 × 五大領域全餐 —</p>
              </div>

              <div className="mt-10">
                <div className="flex items-center justify-between mb-4 border-b border-gray-200 pb-2">
                  <span className="text-sm font-bold text-gray-400 tracking-wider">OFFICIAL WEBSITE</span>
                  <a href="https://www.es.ntnu.edu.tw/" target="_blank" rel="noreferrer" className="text-sm flex items-center gap-1 text-[#003B71] hover:underline transition-colors">
                    開啟新視窗 <ExternalLink size={14}/>
                  </a>
                </div>
                <div className="w-full h-[500px] bg-gray-50 border border-gray-200">
                  <iframe 
                    src="https://www.es.ntnu.edu.tw/" 
                    className="w-full h-full grayscale hover:grayscale-0 transition-all duration-500"
                    title="ES NTNU Website"
                    loading="lazy"
                  ></iframe>
                </div>
              </div>
            </div>
          </section>
        </div>
      </div>
    );

    // --- 2. 活動介紹區塊 ---
    const EventsSection = () => {
      // 直接使用 eventsData 並渲染
