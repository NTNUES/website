    // --- 輪播圖組件 (HeroCarousel) ---
    const HeroCarousel = ({ onNavigate }) => {
      const slides = eventsData;
      const [current, setCurrent] = useState(0);
      const timeoutRef = useRef(null);

      const resetTimeout = () => {
        if (timeoutRef.current) {
          clearTimeout(timeoutRef.current);
        }
      };

      useEffect(() => {
        resetTimeout();
        timeoutRef.current = setTimeout(() => {
          setCurrent((prevIndex) => 
            prevIndex === slides.length - 1 ? 0 : prevIndex + 1
          );
        }, 5000);
        return () => { resetTimeout(); };
      }, [current]);

      const nextSlide = (e) => {
        if(e) e.stopPropagation();
        setCurrent(current === slides.length - 1 ? 0 : current + 1);
      };

      const prevSlide = (e) => {
        if(e) e.stopPropagation();
        setCurrent(current === 0 ? slides.length - 1 : current - 1);
      };

      return (
        <div className="relative w-full h-[300px] md:h-[500px] lg:h-[600px] overflow-hidden mb-12 group bg-slate-100 cursor-pointer">
          <div 
            className="w-full h-full flex transition-transform duration-700 ease-out"
            style={{ transform: `translateX(-${current * 100}%)` }}
            onClick={() => onNavigate('events')} 
          >

      const formatContent = (content) => {
        const urlRegex = /(https?:\/\/[^\s]+)/g;
        return content.split('\n').map((line, i) => (
          <React.Fragment key={i}>
            {line.split(urlRegex).map((part, j) => {
              if (part.match(urlRegex)) {
                return (
                  <a key={j} href={part} target="_blank" rel="noopener noreferrer" className="text-blue-600 hover:underline break-all">
                    {part}

                );

              return part;

            <br />

        ));

                  ))}

        </div>
      );
